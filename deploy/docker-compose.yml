services:
  sub2api:
  #  image: ghcr.io/dr-lin-eng/sub2api:22b2ed086ba6-compat
    image: ghcr.io/dr-lin-eng/sub2api:compat-latest
    container_name: sub2api
    restart: unless-stopped
    # --- 让 sub2api 飞起来的配置 ---
    deploy:
      resources:
        limits:
          cpus: '7.0'      # 允许最高使用 7 核，留 1 核给系统和其他服务
          memory: 20G      # 允许最高使用 28GB 内存
        reservations:
          cpus: '2.0'      # 至少保证它有 2 核可用
          memory: 4G       # 至少保证它有 4GB 物理内存，避免被交换到磁盘
    # -----------------------------
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "${BIND_HOST:-0.0.0.0}:${SERVER_PORT:-8080}:8080"
    volumes:
      - sub2api_data:/app/data
    environment:
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=${SERVER_MODE:-release}
      - RUN_MODE=${RUN_MODE:-standard}
      # 数据库连接池保持目前的设置，避免连接过多撑爆 Postgres
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-50}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-10}
      # ... 其他环境变量保持不变 ...
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-sub2api}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_DBNAME=${POSTGRES_DB:-sub2api}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sub2api-network

  postgres:
    image: postgres:18-alpine
    container_name: sub2api-postgres
    restart: unless-stopped
    # --- 严格限制数据库，防止抢资源 ---
    deploy:
      resources:
        limits:
          cpus: '1.5'      # 强行锁定 1 核
          memory: 1G       # 强行锁定 2G 内存
    # -------------------------------
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - PGDATA=/var/lib/postgresql/data/18/docker
      - POSTGRES_USER=${POSTGRES_USER:-sub2api}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-sub2api}
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"]

  redis:
    image: redis:8-alpine
    container_name: sub2api-redis
    restart: unless-stopped
    # --- Redis 是内存数据库，给 512MB 足够缓存 key ---
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    # -------------------------------
    volumes:
      - redis_data:/data
    command: >
        sh -c '
          redis-server
          --save "" 
          --appendonly yes
          ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

volumes:
  sub2api_data:
  postgres_data:
  redis_data:

networks:
  sub2api-network:
    driver: bridge